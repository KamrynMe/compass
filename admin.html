<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Scheduler Admin · Feedback</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #15110b;
    --surface: #1d180f;
    --ink: #f0e8d5;
    --ink2: #c8c0aa;
    --ink3: #8a8270;
    --rule: #3a3024;
    --gold: #c9a84c;
    --gold-deep: #8a6820;
    --green: #1ec45a;
    --red: #c05050;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: var(--bg); color: var(--ink);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    font-size: 16px; line-height: 1.5;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 800px; margin: 0 auto; padding: 28px 18px 80px; }
  h1 { font-size: 26px; font-weight: 800; margin-bottom: 6px; }
  .sub { color: var(--ink3); font-size: 14px; margin-bottom: 24px; }
  .card {
    background: var(--surface);
    border: 1px solid var(--rule);
    border-radius: 12px;
    padding: 18px;
    margin-bottom: 16px;
  }
  .login-card { max-width: 380px; margin: 14vh auto; }
  label { display: block; font-size: 13px; color: var(--ink3); font-weight: 600; margin-bottom: 6px; }
  input, button, textarea {
    font-family: inherit; font-size: 16px; color: var(--ink);
  }
  .input {
    width: 100%; padding: 10px 12px;
    background: #2a2418; border: 1px solid var(--rule); border-radius: 8px;
    color: var(--ink);
  }
  .input:focus { outline: 2px solid var(--gold); outline-offset: 0; }
  .btn-primary {
    background: var(--gold); color: white; border: none;
    border-radius: 8px; padding: 12px; font-weight: 700; font-size: 16px;
    cursor: pointer; min-height: 48px;
  }
  .btn-secondary {
    background: var(--surface); color: var(--ink);
    border: 1px solid var(--rule); border-radius: 8px;
    padding: 8px 12px; font-weight: 600; cursor: pointer; min-height: 36px;
  }
  .btn-danger {
    background: var(--red); color: white; border: none;
    border-radius: 8px; padding: 8px 12px; font-weight: 700; cursor: pointer;
  }
  .row { display: flex; gap: 8px; align-items: center; }
  .row > * { flex: 1; }
  .empty { color: var(--ink3); text-align: center; padding: 32px 8px; }
  .fb-row {
    border-top: 1px solid var(--rule);
    padding: 14px 0;
  }
  .fb-row:first-child { border-top: none; }
  .fb-meta {
    color: var(--ink3); font-size: 12px;
    display: flex; justify-content: space-between; gap: 8px; flex-wrap: wrap;
    margin-bottom: 6px;
  }
  .fb-body { white-space: pre-wrap; line-height: 1.55; }
  .fb-id { font-family: ui-monospace, Consolas, Menlo, monospace; opacity: 0.7; font-size: 11px; }
  .toolbar { display: flex; gap: 8px; align-items: center; margin-bottom: 14px; flex-wrap: wrap; }
  .toolbar .input { flex: 1; min-width: 0; }
  .pill {
    display: inline-block; padding: 2px 8px; border-radius: 999px;
    font-size: 11px; font-weight: 700; background: var(--surface); color: var(--ink2);
    border: 1px solid var(--rule);
  }
  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: #2a2418; color: var(--ink);
    padding: 10px 16px; border-radius: 8px; font-size: 14px;
    box-shadow: 0 4px 14px rgba(0,0,0,0.4); z-index: 50;
  }
</style>
</head>
<body>
<div class="wrap">
  <div id="login" class="card login-card" style="display:none;">
    <h1>Admin login</h1>
    <p class="sub">Scheduler feedback dashboard</p>
    <label for="u">Username</label>
    <input class="input" type="text" id="u" autocomplete="username">
    <div style="height:10px;"></div>
    <label for="p">Password</label>
    <input class="input" type="password" id="p" autocomplete="current-password">
    <div style="height:14px;"></div>
    <button class="btn-primary" id="login-btn" style="width:100%;">Sign in</button>
  </div>

  <div id="dash" style="display:none;">
    <h1>Feedback inbox</h1>
    <p class="sub" id="counts">—</p>

    <div class="toolbar">
      <input class="input" id="search" placeholder="Search feedback…">
      <button class="btn-secondary" id="refresh">Refresh</button>
      <button class="btn-secondary" id="logout">Log out</button>
    </div>

    <div id="list" class="card"></div>
  </div>
</div>

<script>
  const SUPABASE_URL = 'https://llvqfneoelymvkigltqa.supabase.co';
  const SUPABASE_ANON_KEY = 'sb_publishable_klbrY4121TC85eO-jJUwvg_ecZAXqgW';
  const ADMIN_USER = 'KamrynMe';
  const ADMIN_PASS = 'Wordpass1';
  const SESSION_KEY = 'sched_admin_ok';

  function $(s) { return document.querySelector(s); }
  function show(id) { $('#login').style.display = id === 'login' ? 'block' : 'none'; $('#dash').style.display = id === 'dash' ? 'block' : 'none'; }
  function toast(msg, ms = 2500) {
    const t = document.createElement('div'); t.className = 'toast'; t.textContent = msg;
    document.body.appendChild(t); setTimeout(() => t.remove(), ms);
  }

  function isLoggedIn() {
    try { return sessionStorage.getItem(SESSION_KEY) === '1'; } catch (_) { return false; }
  }
  function setLoggedIn(b) { try { sessionStorage.setItem(SESSION_KEY, b ? '1' : ''); } catch (_) {} }

  async function fetchFeedback() {
    const url = `${SUPABASE_URL}/rest/v1/feedback?select=*&order=created_at.desc&limit=500`;
    const r = await fetch(url, {
      headers: {
        'apikey': SUPABASE_ANON_KEY,
        'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
      },
    });
    if (!r.ok) throw new Error('HTTP ' + r.status);
    return r.json();
  }

  async function deleteFeedback(id) {
    const url = `${SUPABASE_URL}/rest/v1/feedback?id=eq.${encodeURIComponent(id)}`;
    const r = await fetch(url, {
      method: 'DELETE',
      headers: {
        'apikey': SUPABASE_ANON_KEY,
        'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
      },
    });
    if (!r.ok) throw new Error('HTTP ' + r.status);
  }

  function escapeHtml(s) {
    return String(s ?? '')
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
  }
  function fmtDate(s) {
    if (!s) return '';
    const d = new Date(s);
    return d.toLocaleString();
  }

  let _all = [];
  async function refresh() {
    $('#list').innerHTML = '<div class="empty">Loading…</div>';
    try {
      _all = await fetchFeedback();
      render();
    } catch (e) {
      $('#list').innerHTML = `<div class="empty">Could not load feedback: ${escapeHtml(e.message || e)}</div>`;
    }
  }

  function render() {
    const q = ($('#search').value || '').trim().toLowerCase();
    const filtered = q ? _all.filter((r) => (r.body || '').toLowerCase().includes(q) || (r.device_id || '').toLowerCase().includes(q)) : _all;
    $('#counts').textContent = `${filtered.length} message${filtered.length === 1 ? '' : 's'}${q ? ` (filtered from ${_all.length})` : ''}`;
    if (!filtered.length) {
      $('#list').innerHTML = '<div class="empty">No feedback yet.</div>';
      return;
    }
    $('#list').innerHTML = filtered.map((r) => `
      <div class="fb-row" data-id="${escapeHtml(r.id)}">
        <div class="fb-meta">
          <span>${fmtDate(r.created_at)} <span class="pill">${escapeHtml(r.app_version || '?')}</span></span>
          <span class="fb-id">${escapeHtml((r.device_id || '').slice(0, 8))}…</span>
        </div>
        <div class="fb-body">${escapeHtml(r.body || '')}</div>
        <div style="margin-top:8px;display:flex;justify-content:flex-end;">
          <button class="btn-danger" data-act="del">Delete</button>
        </div>
      </div>
    `).join('');
    document.querySelectorAll('.fb-row').forEach((row) => {
      row.querySelector('[data-act="del"]').addEventListener('click', async () => {
        if (!confirm('Delete this feedback message?')) return;
        try {
          await deleteFeedback(row.dataset.id);
          _all = _all.filter((x) => String(x.id) !== row.dataset.id);
          render();
        } catch (e) {
          toast('Delete failed: ' + (e.message || e));
        }
      });
    });
  }

  $('#login-btn').addEventListener('click', () => {
    const u = $('#u').value.trim();
    const p = $('#p').value;
    if (u !== ADMIN_USER || p !== ADMIN_PASS) {
      toast('Invalid credentials');
      return;
    }
    setLoggedIn(true);
    show('dash');
    refresh();
  });
  $('#logout').addEventListener('click', () => {
    setLoggedIn(false);
    show('login');
    $('#u').value = ''; $('#p').value = '';
  });
  $('#refresh').addEventListener('click', refresh);
  $('#search').addEventListener('input', () => render());

  // Boot
  if (isLoggedIn()) { show('dash'); refresh(); } else { show('login'); $('#u').focus(); }
</script>
</body>
</html>
