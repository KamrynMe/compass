<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Scheduler Admin · Feedback</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #15110b;
    --surface: #1d180f;
    --ink: #f0e8d5;
    --ink2: #c8c0aa;
    --ink3: #8a8270;
    --rule: #3a3024;
    --gold: #c9a84c;
    --gold-deep: #8a6820;
    --green: #1ec45a;
    --red: #c05050;
    --blue: #4a7ab0;
    --purple: #8a5ab0;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: var(--bg); color: var(--ink);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    font-size: 16px; line-height: 1.5;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 800px; margin: 0 auto; padding: 28px 18px 80px; }
  h1 { font-size: 26px; font-weight: 800; margin-bottom: 6px; }
  .sub { color: var(--ink3); font-size: 14px; margin-bottom: 24px; }
  .card {
    background: var(--surface);
    border: 1px solid var(--rule);
    border-radius: 12px;
    padding: 18px;
    margin-bottom: 16px;
  }
  .login-card { max-width: 380px; margin: 14vh auto; }
  label { display: block; font-size: 13px; color: var(--ink3); font-weight: 600; margin-bottom: 6px; }
  input, button, textarea {
    font-family: inherit; font-size: 16px; color: var(--ink);
  }
  .input {
    width: 100%; padding: 10px 12px;
    background: #2a2418; border: 1px solid var(--rule); border-radius: 8px;
    color: var(--ink);
  }
  .input:focus { outline: 2px solid var(--gold); outline-offset: 0; }
  .btn-primary {
    background: var(--gold); color: white; border: none;
    border-radius: 8px; padding: 12px; font-weight: 700; font-size: 16px;
    cursor: pointer; min-height: 48px;
  }
  .btn-secondary {
    background: var(--surface); color: var(--ink);
    border: 1px solid var(--rule); border-radius: 8px;
    padding: 8px 12px; font-weight: 600; cursor: pointer; min-height: 36px;
  }
  .btn-secondary:hover { background: #2a2418; }
  .btn-danger {
    background: var(--red); color: white; border: none;
    border-radius: 8px; padding: 8px 12px; font-weight: 700; cursor: pointer;
  }
  .btn-action {
    border: none; border-radius: 8px; padding: 8px 12px;
    font-size: 13px; font-weight: 700; cursor: pointer; color: white;
  }
  .btn-snooze { background: #5a4818; color: var(--gold); border: 1px solid var(--gold-deep); }
  .btn-copy { background: #1a3550; color: #b4d5ff; border: 1px solid #2c5680; }
  .btn-complete { background: #154e2a; color: #b8f5cf; border: 1px solid #1f7a40; }
  .btn-reopen { background: #4a3018; color: #f0d4a0; border: 1px solid #6e4624; }
  .btn-delete { background: #4a1818; color: #ffb4b4; border: 1px solid #6e2424; }
  .btn-note { background: #2a2a48; color: #cbcaf0; border: 1px solid #4040a8; }
  .btn-queue { background: #2e1e3a; color: #d6b8f0; border: 1px solid var(--purple); }
  .btn-unqueue { background: #2e1e3a; color: #d6b8f0; border: 1px solid var(--purple); opacity: 0.7; }
  .note-editor {
    margin-top: 10px; display: none;
    background: #1a1610; border: 1px solid var(--rule); border-radius: 8px;
    padding: 10px;
  }
  .note-editor.open { display: block; }
  .note-editor textarea {
    width: 100%; min-height: 80px; resize: vertical;
    background: #2a2418; color: var(--ink);
    border: 1px solid var(--rule); border-radius: 6px;
    padding: 8px 10px; font-family: inherit; font-size: 14px; line-height: 1.5;
  }
  .note-editor .row-buttons { display: flex; gap: 8px; margin-top: 8px; justify-content: flex-end; }
  .admin-note-display {
    margin-top: 8px;
    padding: 8px 10px;
    background: #1a1a2e;
    border-left: 3px solid var(--purple);
    border-radius: 0 6px 6px 0;
    font-size: 13px; color: var(--ink2); line-height: 1.5;
    white-space: pre-wrap;
  }
  .admin-note-display::before {
    content: 'Admin note';
    display: block;
    font-size: 10px; font-weight: 800; letter-spacing: 1px;
    color: var(--purple); margin-bottom: 4px; text-transform: uppercase;
  }
  .row { display: flex; gap: 8px; align-items: center; }
  .row > * { flex: 1; }
  .empty { color: var(--ink3); text-align: center; padding: 32px 8px; }
  .fb-row {
    border-top: 1px solid var(--rule);
    padding: 14px 0;
  }
  .fb-row:first-child { border-top: none; }
  .fb-row.snoozed { opacity: 0.65; }
  .fb-row.completed { opacity: 0.55; }
  .fb-row.completed .fb-body { text-decoration: line-through; text-decoration-color: var(--ink3); }
  .fb-meta {
    color: var(--ink3); font-size: 12px;
    display: flex; justify-content: space-between; gap: 8px; flex-wrap: wrap;
    margin-bottom: 6px;
  }
  .fb-body { white-space: pre-wrap; line-height: 1.55; }
  .fb-id { font-family: ui-monospace, Consolas, Menlo, monospace; opacity: 0.7; font-size: 11px; }
  .fb-actions {
    margin-top: 10px; display: flex; gap: 8px; flex-wrap: wrap; justify-content: flex-end;
  }
  .toolbar { display: flex; gap: 8px; align-items: center; margin-bottom: 14px; flex-wrap: wrap; }
  .toolbar .input { flex: 1; min-width: 0; }
  .pill {
    display: inline-block; padding: 2px 8px; border-radius: 999px;
    font-size: 11px; font-weight: 700; background: var(--surface); color: var(--ink2);
    border: 1px solid var(--rule);
  }
  .pill.snoozed { background: #2a2210; color: var(--gold); border-color: var(--gold-deep); }
  .pill.completed { background: #102e1a; color: #4dd587; border-color: #1f7a40; }
  .pill.queued { background: #2a1e3a; color: #d6b8f0; border-color: var(--purple); }
  .fb-row.queued { border-left: 3px solid var(--purple); padding-left: 10px; margin-left: -10px; }
  .filter-tabs {
    display: flex; gap: 0; margin-bottom: 14px;
    background: var(--surface); border: 1px solid var(--rule);
    border-radius: 10px; padding: 4px; overflow: hidden;
  }
  .filter-tab {
    flex: 1; background: transparent; border: none;
    padding: 8px 12px; color: var(--ink3); font-weight: 700;
    border-radius: 6px; cursor: pointer; min-height: 38px;
  }
  .filter-tab.active { background: var(--gold); color: #1a1612; }
  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: #2a2418; color: var(--ink);
    padding: 10px 16px; border-radius: 8px; font-size: 14px;
    box-shadow: 0 4px 14px rgba(0,0,0,0.4); z-index: 50;
  }
</style>
</head>
<body>
<div class="wrap">
  <div id="login" class="card login-card" style="display:none;">
    <h1>Admin login</h1>
    <p class="sub">Scheduler feedback dashboard</p>
    <label for="u">Username</label>
    <input class="input" type="text" id="u" autocomplete="username">
    <div style="height:10px;"></div>
    <label for="p">Password</label>
    <input class="input" type="password" id="p" autocomplete="current-password">
    <div style="height:14px;"></div>
    <button class="btn-primary" id="login-btn" style="width:100%;">Sign in</button>
  </div>

  <div id="dash" style="display:none;">
    <h1>Feedback inbox</h1>
    <p class="sub" id="counts">—</p>

    <div class="filter-tabs" id="filter-tabs">
      <button class="filter-tab active" data-filter="open">Uncompleted</button>
      <button class="filter-tab" data-filter="queue">Queue</button>
      <button class="filter-tab" data-filter="done">Completed</button>
      <button class="filter-tab" data-filter="all">All</button>
    </div>

    <div class="toolbar">
      <input class="input" id="search" placeholder="Search feedback…">
      <button class="btn-secondary" id="refresh">Refresh</button>
      <button class="btn-secondary" id="logout">Log out</button>
    </div>

    <div id="list" class="card"></div>
  </div>
</div>

<script>
  const SUPABASE_URL = 'https://llvqfneoelymvkigltqa.supabase.co';
  const SUPABASE_ANON_KEY = 'sb_publishable_klbrY4121TC85eO-jJUwvg_ecZAXqgW';
  const ADMIN_USER = 'KamrynMe';
  const ADMIN_PASS = 'Wordpass1';
  const SESSION_KEY = 'sched_admin_ok';
  const FILTER_KEY = 'sched_admin_filter';

  function $(s) { return document.querySelector(s); }
  function show(id) { $('#login').style.display = id === 'login' ? 'block' : 'none'; $('#dash').style.display = id === 'dash' ? 'block' : 'none'; }
  function toast(msg, ms = 1800) {
    const t = document.createElement('div'); t.className = 'toast'; t.textContent = msg;
    document.body.appendChild(t); setTimeout(() => t.remove(), ms);
  }
  function isLoggedIn() { try { return sessionStorage.getItem(SESSION_KEY) === '1'; } catch (_) { return false; } }
  function setLoggedIn(b) { try { sessionStorage.setItem(SESSION_KEY, b ? '1' : ''); } catch (_) {} }
  function getFilter() { try { return localStorage.getItem(FILTER_KEY) || 'open'; } catch (_) { return 'open'; } }
  function setFilter(v) { try { localStorage.setItem(FILTER_KEY, v); } catch (_) {} }

  async function fetchFeedback() {
    const url = `${SUPABASE_URL}/rest/v1/feedback?select=*&order=created_at.desc&limit=1000`;
    const r = await fetch(url, {
      headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}` },
    });
    if (!r.ok) throw new Error('HTTP ' + r.status);
    return r.json();
  }
  async function patchFeedback(id, patch) {
    const url = `${SUPABASE_URL}/rest/v1/feedback?id=eq.${encodeURIComponent(id)}`;
    const r = await fetch(url, {
      method: 'PATCH',
      headers: {
        'apikey': SUPABASE_ANON_KEY,
        'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
        'Content-Type': 'application/json',
        'Prefer': 'return=minimal',
      },
      body: JSON.stringify(patch),
    });
    if (!r.ok) throw new Error('HTTP ' + r.status);
  }
  async function deleteFeedback(id) {
    const url = `${SUPABASE_URL}/rest/v1/feedback?id=eq.${encodeURIComponent(id)}`;
    const r = await fetch(url, {
      method: 'DELETE',
      headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}` },
    });
    if (!r.ok) throw new Error('HTTP ' + r.status);
  }

  function escapeHtml(s) {
    return String(s ?? '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
  }
  function fmtDate(s) { if (!s) return ''; return new Date(s).toLocaleString(); }

  let _all = [];
  let _filter = getFilter();

  async function refresh() {
    $('#list').innerHTML = '<div class="empty">Loading…</div>';
    try { _all = await fetchFeedback(); render(); }
    catch (e) { $('#list').innerHTML = `<div class="empty">Could not load: ${escapeHtml(e.message || e)}</div>`; }
  }

  function applyFilter(rows) {
    if (_filter === 'open') return rows.filter((r) => !r.completed_at);
    if (_filter === 'queue') return rows.filter((r) => !!r.queued_at && !r.completed_at);
    if (_filter === 'done') return rows.filter((r) => !!r.completed_at);
    return rows;
  }

  function applySort(rows) {
    // Buckets: queued (0) > active (1) > snoozed (2) > completed (3).
    // Within Queue view, sort by queued_at desc; otherwise by relevant timestamp.
    const score = (r) => {
      let bucket;
      if (r.completed_at) bucket = 3;
      else if (r.queued_at) bucket = 0;
      else if (r.snoozed_at) bucket = 2;
      else bucket = 1;
      const t = new Date(
        r.completed_at || r.queued_at || r.snoozed_at || r.created_at || 0
      ).getTime();
      return [bucket, -t];
    };
    return rows.slice().sort((a, b) => {
      const sa = score(a), sb = score(b);
      if (sa[0] !== sb[0]) return sa[0] - sb[0];
      return sa[1] - sb[1];
    });
  }

  function render() {
    const savedScroll = window.scrollY;
    document.querySelectorAll('.filter-tab').forEach((b) => b.classList.toggle('active', b.dataset.filter === _filter));
    const q = ($('#search').value || '').trim().toLowerCase();
    let rows = applyFilter(_all);
    if (q) rows = rows.filter((r) => (r.body || '').toLowerCase().includes(q) || (r.device_id || '').toLowerCase().includes(q));
    rows = applySort(rows);

    const totalOpen = _all.filter((r) => !r.completed_at).length;
    const totalDone = _all.filter((r) => !!r.completed_at).length;
    const totalQueue = _all.filter((r) => !!r.queued_at && !r.completed_at).length;
    $('#counts').textContent = `${totalOpen} open · ${totalQueue} queued · ${totalDone} completed · ${_all.length} total${q ? ` (showing ${rows.length})` : ''}`;

    if (!rows.length) { $('#list').innerHTML = '<div class="empty">No feedback to show.</div>'; return; }

    $('#list').innerHTML = rows.map((r) => {
      const cls = r.completed_at ? 'completed' : (r.queued_at ? 'queued' : (r.snoozed_at ? 'snoozed' : ''));
      const tags = [];
      if (r.queued_at && !r.completed_at) tags.push(`<span class="pill queued">In Queue · ${fmtDate(r.queued_at)}</span>`);
      if (r.snoozed_at && !r.completed_at) tags.push(`<span class="pill snoozed">Snoozed · ${fmtDate(r.snoozed_at)}</span>`);
      if (r.completed_at) tags.push(`<span class="pill completed">Done · ${fmtDate(r.completed_at)}</span>`);
      const completeBtn = r.completed_at
        ? `<button class="btn-action btn-reopen" data-act="reopen">↺ Reopen</button>`
        : `<button class="btn-action btn-complete" data-act="complete">✓ Completed</button>`;
      const snoozeBtn = r.completed_at
        ? ''
        : (r.snoozed_at
            ? `<button class="btn-action btn-snooze" data-act="unsnooze">⏰ Unsnooze</button>`
            : `<button class="btn-action btn-snooze" data-act="snooze">💤 Snooze</button>`);
      const queueBtn = r.completed_at
        ? ''
        : (r.queued_at
            ? `<button class="btn-action btn-unqueue" data-act="unqueue">↩ Remove from Queue</button>`
            : `<button class="btn-action btn-queue" data-act="queue">＋ Queue</button>`);
      const noteHas = !!(r.admin_note && r.admin_note.trim());
      const noteBtn = `<button class="btn-action btn-note" data-act="note">${noteHas ? '✎ Edit note' : '＋ Add note'}</button>`;
      const noteDisplay = noteHas ? `<div class="admin-note-display">${escapeHtml(r.admin_note)}</div>` : '';
      const noteEditor = `
        <div class="note-editor" data-editor>
          <textarea data-note-text placeholder="Private admin notes (only visible to admins)…">${escapeHtml(r.admin_note || '')}</textarea>
          <div class="row-buttons">
            <button class="btn-action btn-delete" data-act="note-clear">Clear</button>
            <button class="btn-action btn-copy" data-act="note-cancel">Cancel</button>
            <button class="btn-action btn-complete" data-act="note-save">Save</button>
          </div>
        </div>
      `;
      return `
        <div class="fb-row ${cls}" data-id="${escapeHtml(r.id)}">
          <div class="fb-meta">
            <span>${fmtDate(r.created_at)} <span class="pill">${escapeHtml(r.app_version || '?')}</span> ${tags.join(' ')}</span>
            <span class="fb-id">${escapeHtml((r.device_id || '').slice(0, 8))}…</span>
          </div>
          <div class="fb-body">${escapeHtml(r.body || '')}</div>
          ${noteDisplay}
          <div class="fb-actions">
            <button class="btn-action btn-copy" data-act="copy">📋 Copy</button>
            ${noteBtn}
            ${queueBtn}
            ${snoozeBtn}
            ${completeBtn}
            <button class="btn-action btn-delete" data-act="delete">Delete</button>
          </div>
          ${noteEditor}
        </div>
      `;
    }).join('');

    document.querySelectorAll('.fb-row').forEach((row) => {
      const id = row.dataset.id;
      const r = _all.find((x) => String(x.id) === id);
      const act = (name) => row.querySelector(`[data-act="${name}"]`);
      // Apply a local patch + re-render in place. No full refetch — keeps
      // scroll position so you can queue/snooze multiple items in a row.
      const wrap = async (patch, label) => {
        try {
          await patchFeedback(id, patch);
          if (r) Object.assign(r, patch);
          toast(label);
          render();
        } catch (e) { toast('Failed: ' + (e.message || e)); }
      };
      act('copy')?.addEventListener('click', async () => {
        try { await navigator.clipboard.writeText(r?.body || ''); toast('Copied'); }
        catch (_) { toast('Copy failed'); }
      });
      act('snooze')?.addEventListener('click', () => wrap({ snoozed_at: new Date().toISOString() }, 'Snoozed'));
      act('unsnooze')?.addEventListener('click', () => wrap({ snoozed_at: null }, 'Unsnoozed'));
      act('complete')?.addEventListener('click', () => wrap({ completed_at: new Date().toISOString(), snoozed_at: null }, 'Marked complete'));
      act('reopen')?.addEventListener('click', () => wrap({ completed_at: null }, 'Reopened'));
      act('queue')?.addEventListener('click', () => wrap({ queued_at: new Date().toISOString(), snoozed_at: null }, 'Added to queue'));
      act('unqueue')?.addEventListener('click', () => wrap({ queued_at: null }, 'Removed from queue'));
      // Notes: toggle inline editor.
      const editor = row.querySelector('[data-editor]');
      act('note')?.addEventListener('click', () => {
        editor.classList.toggle('open');
        if (editor.classList.contains('open')) editor.querySelector('[data-note-text]').focus();
      });
      act('note-cancel')?.addEventListener('click', () => {
        editor.classList.remove('open');
        editor.querySelector('[data-note-text]').value = r?.admin_note || '';
      });
      act('note-save')?.addEventListener('click', async () => {
        const text = editor.querySelector('[data-note-text]').value;
        try {
          await patchFeedback(id, { admin_note: text });
          if (r) r.admin_note = text;
          toast('Note saved');
          render();
        } catch (e) { toast('Save failed: ' + (e.message || e)); }
      });
      act('note-clear')?.addEventListener('click', async () => {
        if (!confirm('Clear the admin note for this message?')) return;
        try {
          await patchFeedback(id, { admin_note: null });
          if (r) r.admin_note = null;
          toast('Note cleared');
          render();
        } catch (e) { toast('Clear failed: ' + (e.message || e)); }
      });
      act('delete')?.addEventListener('click', async () => {
        if (!confirm('Delete this feedback message?')) return;
        try {
          await deleteFeedback(id);
          _all = _all.filter((x) => String(x.id) !== id);
          toast('Deleted');
          render();
        } catch (e) { toast('Delete failed: ' + (e.message || e)); }
      });
    });

    // Restore scroll position so the page doesn't jump when re-rendering after
    // a queue/snooze/complete/note-save action.
    window.scrollTo(0, savedScroll);
  }

  $('#login-btn').addEventListener('click', () => {
    const u = $('#u').value.trim();
    const p = $('#p').value;
    if (u !== ADMIN_USER || p !== ADMIN_PASS) { toast('Invalid credentials'); return; }
    setLoggedIn(true); show('dash'); refresh();
  });
  $('#logout').addEventListener('click', () => {
    setLoggedIn(false); show('login'); $('#u').value = ''; $('#p').value = '';
  });
  $('#refresh').addEventListener('click', refresh);
  $('#search').addEventListener('input', () => render());
  document.querySelectorAll('.filter-tab').forEach((b) => {
    b.addEventListener('click', () => { _filter = b.dataset.filter; setFilter(_filter); render(); });
  });

  if (isLoggedIn()) { show('dash'); refresh(); } else { show('login'); $('#u').focus(); }
</script>
</body>
</html>
